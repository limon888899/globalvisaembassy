<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - Visa Status Management</title>

  <!-- robots.txt এ এই পেজ disallow করে রাখবেন যাতে সার্চ ইঞ্জিনে ইনডেক্স না হয় -->
  <meta name="robots" content="noindex, nofollow">

  <link rel="stylesheet" href="admin.css">
</head>
<body>

  <!-- ========================================= -->
  <!-- ১. লগইন স্ক্রিন (পেজ লোড হলে প্রথমে এটাই দেখা যাবে) -->
  <!-- ========================================= -->
  <section id="loginScreen" class="screen">
    <div class="login-card">
      <div class="login-card__brand">
        <div class="login-card__logo">VA</div>
        <h1 class="login-card__title">Admin Panel</h1>
        <p class="login-card__subtitle">শুধুমাত্র অনুমোদিত অ্যাডমিনদের জন্য</p>
      </div>

      <form id="loginForm" class="login-form">
        <label class="field">
          <span class="field__label">Username / Email</span>
          <input type="text" id="username" name="username" autocomplete="username" required>
        </label>

        <label class="field">
          <span class="field__label">Password</span>
          <input type="password" id="password" name="password" autocomplete="current-password" required>
        </label>

        <!-- লগইন ব্যর্থ হলে এখানে এরর মেসেজ দেখাবে -->
        <p id="loginError" class="error-message" hidden></p>

        <button type="submit" id="loginBtn" class="btn btn--primary btn--block">
          <span class="btn__text">Login</span>
        </button>
      </form>
    </div>
  </section>

  <!-- ========================================= -->
  <!-- ২. ড্যাশবোর্ড স্ক্রিন (লগইনের পর দেখা যাবে) -->
  <!-- ========================================= -->
  <section id="dashboardScreen" class="screen" hidden>

    <header class="topbar">
      <div class="topbar__brand">
        <span class="topbar__logo">VA</span>
        <span class="topbar__title">Visa Admin Dashboard</span>
      </div>
      <div class="topbar__right">
        <span id="adminNameLabel" class="topbar__admin-name"></span>
        <button id="logoutBtn" class="btn btn--ghost">Logout</button>
      </div>
    </header>

    <main class="dashboard">

      <!-- স্ট্যাটাস কার্ড গুলো (মোট আবেদন, পেন্ডিং, অ্যাপ্রুভড) -->
      <div class="stats-row" id="statsRow">
        <div class="stat-card">
          <span class="stat-card__value" id="statTotal">0</span>
          <span class="stat-card__label">মোট আবেদন</span>
        </div>
        <div class="stat-card stat-card--pending">
          <span class="stat-card__value" id="statPending">0</span>
          <span class="stat-card__label">Pending</span>
        </div>
        <div class="stat-card stat-card--approved">
          <span class="stat-card__value" id="statApproved">0</span>
          <span class="stat-card__label">Approved</span>
        </div>
        <div class="stat-card stat-card--rejected">
          <span class="stat-card__value" id="statRejected">0</span>
          <span class="stat-card__label">Rejected</span>
        </div>
      </div>

      <!-- পাসপোর্ট নম্বর দিয়ে সার্চ করার বার -->
      <section class="panel">
        <h2 class="panel__title">পাসপোর্ট নম্বর দিয়ে খুঁজুন</h2>
        <form id="searchForm" class="search-bar">
          <input
            type="text"
            id="searchPassport"
            placeholder="যেমন: AB1234567"
            autocomplete="off"
          >
          <button type="submit" class="btn btn--primary">খুঁজুন</button>
          <button type="button" id="showAllBtn" class="btn btn--ghost">সব দেখাও</button>
        </form>
      </section>

      <!-- ভিসা আবেদনের তালিকা + স্ট্যাটাস আপডেট -->
      <section class="panel">
        <div class="panel__header">
          <h2 class="panel__title">ভিসা আবেদনের তালিকা</h2>
          <button id="refreshBtn" class="btn btn--ghost btn--small">রিফ্রেশ</button>
        </div>

        <div class="table-wrapper">
          <table class="data-table">
            <thead>
              <tr>
                <th>পাসপোর্ট নম্বর</th>
                <th>আবেদনকারীর নাম</th>
                <th>বর্তমান স্ট্যাটাস</th>
                <th>আপডেট তারিখ</th>
                <th>অ্যাকশন</th>
              </tr>
            </thead>
            <!-- এই tbody টা JavaScript দিয়ে ডাইনামিকভাবে ভরা হবে -->
            <tbody id="visaTableBody">
              <tr>
                <td colspan="5" class="data-table__empty">লোড হচ্ছে...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>

    </main>
  </section>

  <!-- ========================================= -->
  <!-- ৩. স্ট্যাটাস পরিবর্তনের কনফার্মেশন মোডাল -->
  <!-- ========================================= -->
  <div id="confirmModal" class="modal" hidden>
    <div class="modal__box">
      <h3 class="modal__title">স্ট্যাটাস আপডেট নিশ্চিত করুন</h3>
      <p id="confirmModalText" class="modal__text"></p>
      <div class="modal__actions">
        <button id="confirmCancelBtn" class="btn btn--ghost">বাতিল</button>
        <button id="confirmOkBtn" class="btn btn--primary">নিশ্চিত করুন</button>
      </div>
    </div>
  </div>

  <!-- টোস্ট নোটিফিকেশন (সফল/এরর মেসেজ দেখানোর জন্য) -->
  <div id="toast" class="toast" hidden></div>

  <script src="admin.js"></script>
</body>
</html>
